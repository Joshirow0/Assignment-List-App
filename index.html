<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Assets/css/main.css">

</head>
<body>

    <header class="header">

    </header>

    <main class="doc-container">
        <section class="doc-section doc-section--contrast doc-section--s">
            <h2 class="heading--h2">Lista de tareas</h2>
            <ul id="lista-tareas">
                
                <li class="card card--horizontal card--transparent card--draggable" draggable="true">
                    <label class="card__body body--row">
                        <input type="checkbox" class="form__checkbox checkbox--m" >
                        <span class="card__text text--muted">Terminar la maquetación de la Tarea 4</span>
                    </label>
                    <button class="btn btn--icon" aria-label="Eliminar tarea">🗑️</button>
                </li>

                <li class="card card--horizontal card--transparent card--draggable" draggable="true">
                    <label class="card__body body--row">
                        <input type="checkbox" class="form__checkbox checkbox--m" checked>
                        <span class="card__text text--muted">Crear el repositorio en GitHub</span>
                    </label>
                    <button class="btn btn--icon" aria-label="Eliminar tarea">🗑️</button>
                </li>

            </ul>

            <div class="secondary-footer">
                <span class="" id="contador-tareas">2 tareas pendientes</span>
                
                <div class="secondary-footer__filters" id="filtros">
                    <button class="btn--link link link--secondary">Todas</button>
                    <button class="btn--link link link--secondary">Pendientes</button>
                    <button class="btn--link link link--secondary">Completadas</button>
                </div>

                <button class="btn--link link link--secondary" id="btn-borrar-completadas">
                    Borrar completadas
                </button>
            </div>
        </section>

    </main>

    <!--  Scripts  -->
    <script src="Assets/js/app.js"></script>
</body>
</html>
