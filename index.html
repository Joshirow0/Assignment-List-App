<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación de Lista de Tareas</title>
    <link rel="stylesheet" href="Assets/css/main.css">

</head>
<body>

    <header class="header">

    </header>

    <main class="doc-container">
        <section class="doc-section doc-section--contrast doc-section--s">
            <h2 class="heading--h2">Lista de tareas</h2>
            <ul id="lista-tareas">
                <!-- Assigments -->
            </ul>

            <div class="secondary-footer">
                <span class="" id="contador-tareas">0 tareas pendientes</span>
                
                <div class="secondary-footer__filters" id="filtros">
                    <button class="btn--link link link--secondary">Todas</button>
                    <button class="btn--link link link--secondary">Pendientes</button>
                    <button class="btn--link link link--secondary">Completadas</button>
                </div>

                <button class="btn--link link link--secondary" id="btn-borrar-completadas">
                    Borrar completadas
                </button>
            </div>
        </section>

        <section class="doc-section doc-section--s">
        <h2 class="heading--h2">Nueva tarea</h2>
        
        <form class="form" id="formulario-tareas">
            <div class="form--group">
                <label for="input-tarea" class="form__label">Asignación</label>
                <input 
                    type="text" 
                    id="input-tarea" 
                    class="form__input" 
                    placeholder="¿Qué necesitas hacer hoy?" 
                    autocomplete="off"
                >
            </div>
            <div>
                <button type="submit" class="form__button btn btn--main">Agregar</button>
            </div>
        </form>
    </section>

    </main>

    <!--  Scripts  -->
    <script type="module" src="Assets/js/app.js"></script>
</body>
</html>
